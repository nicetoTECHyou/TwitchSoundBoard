<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwitchSoundBoard – OBS Overlay</title>
  <style>
    /* ============================================= 
       Overlay Basis – Transparent für OBS
       ============================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Container für alle Media-Elemente */
    #overlay-container {
      position: relative;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Video Container */
    #video-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 10;
    }

    #video-container video {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
    }

    /* Debug-Leiste (oben rechts, kann per URL-Parameter aktiviert werden) */
    #debug-bar {
      display: none;
      position: fixed;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.7);
      color: #00ff88;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      z-index: 999;
      pointer-events: none;
      max-width: 350px;
      word-break: break-word;
    }

    /* Verbindungstatus Indikator */
    #connection-status {
      display: none;
      position: fixed;
      bottom: 8px;
      left: 8px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      z-index: 999;
      pointer-events: none;
    }

    #connection-status.connected {
      background: rgba(0, 200, 80, 0.3);
      color: #00ff88;
    }

    #connection-status.disconnected {
      background: rgba(200, 0, 0, 0.3);
      color: #ff4444;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      to { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
    }
  </style>
</head>
<body>
  <div id="overlay-container">
    <div id="video-container">
      <video id="video-player" playsinline></video>
    </div>
  </div>

  <div id="debug-bar"></div>
  <div id="connection-status" class="disconnected">⬤ Disconnected</div>

  <script>
    // =============================================
    // TwitchSoundBoard – OBS Overlay Client
    // =============================================

    // Konfiguration (wird vom Server beim Connect gesendet)
    let overlayConfig = null;

    // Queue System
    const queue = [];
    let isPlaying = false;
    const MAX_QUEUE = 10;

    // DOM Elemente
    const videoContainer = document.getElementById('video-container');
    const videoPlayer = document.getElementById('video-player');
    const debugBar = document.getElementById('debug-bar');
    const connectionStatus = document.getElementById('connection-status');

    // ---- URL-Parameter auslesen ----
    const urlParams = new URLSearchParams(window.location.search);
    const debugMode = urlParams.has('debug');

    if (debugMode) {
      debugBar.style.display = 'block';
      connectionStatus.style.display = 'block';
    }

    // ---- WebSocket Verbindung ----
    function getWsUrl() {
      // WS-Port ist i.d.R. HTTP-Port + 1
      const currentHost = window.location.hostname;
      const currentPort = parseInt(window.location.port) || 3000;
      const wsPort = currentPort + 1; // Standard: 3000 -> 3001
      return `ws://${currentHost}:${wsPort}`;
    }

    let ws = null;
    let reconnectAttempts = 0;
    const MAX_RECONNECT = 50;
    const RECONNECT_DELAY_BASE = 1000;

    function connectWebSocket() {
      const url = getWsUrl();
      debugLog(`Verbinde zu ${url}...`);

      ws = new WebSocket(url);

      ws.onopen = () => {
        reconnectAttempts = 0;
        updateConnectionStatus(true);
        debugLog('Verbunden!');
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleMessage(data);
        } catch (err) {
          debugLog(`Fehler beim Parsen: ${err.message}`);
        }
      };

      ws.onclose = () => {
        updateConnectionStatus(false);
        scheduleReconnect();
      };

      ws.onerror = (err) => {
        debugLog(`WebSocket Fehler`);
        ws.close();
      };
    }

    function scheduleReconnect() {
      if (reconnectAttempts >= MAX_RECONNECT) {
        debugLog('Maximale Reconnect-Versuche erreicht.');
        return;
      }
      reconnectAttempts++;
      const delay = Math.min(RECONNECT_DELAY_BASE * Math.pow(1.5, reconnectAttempts - 1), 30000);
      debugLog(`Reconnect in ${Math.round(delay / 1000)}s (Versuch ${reconnectAttempts}/${MAX_RECONNECT})`);
      setTimeout(connectWebSocket, delay);
    }

    function updateConnectionStatus(connected) {
      connectionStatus.className = connected ? 'connected' : 'disconnected';
      connectionStatus.textContent = connected ? '● Connected' : '● Disconnected';
    }

    // ---- Nachrichten verarbeiten ----
    function handleMessage(data) {
      switch (data.type) {
        case 'init':
          overlayConfig = data.config;
          debugLog('Config empfangen. Overlay bereit.');
          break;

        case 'play':
          enqueueMedia(data);
          break;

        case 'config_reloaded':
          overlayConfig = data.config;
          debugLog('Config neu geladen.');
          break;

        default:
          debugLog(`Unbekannter Nachrichtentyp: ${data.type}`);
      }
    }

    // ---- Media Queue ----
    function enqueueMedia(data) {
      const maxQ = data.maxQueue || MAX_QUEUE;

      if (queue.length >= maxQ) {
        debugLog(`Queue voll (${queue.length}/${maxQ}), Element wird verworfen.`);
        return;
      }

      queue.push(data);
      debugLog(`Queue: "${data.file}" hinzugefügt (${data.user} via ${data.source}) [${queue.length}]`);

      if (!isPlaying) {
        processQueue();
      }
    }

    function processQueue() {
      if (queue.length === 0) {
        isPlaying = false;
        debugLog('Queue leer – Warte auf neue Events.');
        return;
      }

      isPlaying = true;
      const item = queue.shift();
      debugLog(`Spiele: "${item.file}" (${item.mediaType}) [${queue.length} verbleibend]`);

      if (item.mediaType === 'video') {
        playVideo(item);
      } else {
        playSound(item);
      }
    }

    // ---- Sound abspielen ----
    function playSound(item) {
      const audio = new Audio(`/sounds/${item.file}`);
      audio.volume = item.volume || 0.8;

      audio.oncanplaythrough = () => {
        audio.play().catch(err => {
          debugLog(`Audio-Play-Fehler: ${err.message}`);
          isPlaying = false;
          processQueue();
        });
      };

      audio.onerror = () => {
        debugLog(`Audio-Datei nicht gefunden: /sounds/${item.file}`);
        isPlaying = false;
        processQueue();
      };

      audio.onended = () => {
        // Kurze Pause zwischen Sounds (200ms)
        setTimeout(() => {
          isPlaying = false;
          processQueue();
        }, 200);
      };
    }

    // ---- Video abspielen ----
    function playVideo(item) {
      const videoSrc = `/videos/${item.file}`;
      videoPlayer.src = videoSrc;
      videoPlayer.volume = item.volume || 0.5;
      videoPlayer.currentTime = 0;

      videoContainer.style.display = 'block';
      videoContainer.style.animation = 'fadeIn 0.2s ease-out';

      videoPlayer.oncanplaythrough = () => {
        videoPlayer.play().catch(err => {
          debugLog(`Video-Play-Fehler: ${err.message}`);
          hideVideo();
          isPlaying = false;
          processQueue();
        });
      };

      videoPlayer.onerror = () => {
        debugLog(`Video-Datei nicht gefunden: /videos/${item.file}`);
        hideVideo();
        isPlaying = false;
        processQueue();
      };

      videoPlayer.onended = () => {
        hideVideo();
        setTimeout(() => {
          isPlaying = false;
          processQueue();
        }, 300);
      };

      // Fallback: Maximale Dauer überschreiben (falls Video keine Duration hat)
      const maxDuration = item.videoDurationOverride || 5000;
      setTimeout(() => {
        if (!videoPlayer.paused && videoPlayer.readyState >= 2) {
          debugLog(`Video-Duration-Limit erreicht (${maxDuration}ms)`);
          videoPlayer.pause();
          videoPlayer.currentTime = 0;
          hideVideo();
          isPlaying = false;
          processQueue();
        }
      }, maxDuration + 500);
    }

    function hideVideo() {
      videoContainer.style.animation = 'fadeOut 0.3s ease-in forwards';
      setTimeout(() => {
        videoContainer.style.display = 'none';
        videoPlayer.pause();
        videoPlayer.removeAttribute('src');
        videoPlayer.load();
      }, 300);
    }

    // ---- Debug-Logging ----
    function debugLog(msg) {
      const ts = new Date().toLocaleTimeString('de-DE');
      const line = `[${ts}] ${msg}`;
      console.log(line);

      if (debugMode && debugBar) {
        debugBar.textContent = line;
      }
    }

    // ---- Start ----
    debugLog('TwitchSoundBoard Overlay gestartet.');
    connectWebSocket();
  </script>
</body>
</html>
