<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwitchSoundBoard – OBS Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #overlay-container {
      position: relative;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #video-container {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 10;
    }
    #video-container video {
      max-width: 100%; max-height: 100%;
      border-radius: 12px;
    }

    /* Kleiner Audio-Status Indikator – nicht blockierend */
    #audio-indicator {
      display: none;
      position: fixed;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.6);
      color: #ffa502;
      padding: 4px 10px;
      border-radius: 4px;
      font: 11px/1.4 'Segoe UI', sans-serif;
      z-index: 9000;
      pointer-events: none;
      user-select: none;
    }
    #audio-indicator.ok { color: #00b894; }

    /* Debug */
    #debug-bar {
      display: none;
      position: fixed;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.75);
      color: #00ff88;
      padding: 8px 12px;
      border-radius: 6px;
      font: 11px/1.5 monospace;
      z-index: 999;
      pointer-events: none;
      max-width: 360px;
      word-break: break-all;
    }

    #ws-status {
      display: none;
      position: fixed;
      bottom: 8px; left: 8px;
      padding: 4px 10px;
      border-radius: 4px;
      font: 11px monospace;
      z-index: 999;
      pointer-events: none;
    }
    #ws-status.ok { background: rgba(0,180,80,0.3); color: #0f8; }
    #ws-status.err { background: rgba(200,0,0,0.3); color: #f44; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%,-50%) scale(0.85); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      to   { opacity: 0; transform: translate(-50%,-50%) scale(1.15); }
    }
  </style>
</head>
<body>
  <div id="overlay-container">
    <div id="video-container">
      <video id="video-player" playsinline></video>
    </div>
  </div>

  <div id="audio-indicator"></div>
  <div id="debug-bar"></div>
  <div id="ws-status" class="err">&#11044; Waiting...</div>

  <script>
    // =============================================
    // TwitchSoundBoard – OBS Overlay v3
    // Robuste Queue, Safety-Timeouts, kein
    // blockierender Audio-Unlock Screen
    // =============================================

    var queue = [];
    var isPlaying = false;
    var MAX_QUEUE = 10;
    var SAFETY_TIMEOUT_MS = 60000; // Max 60s pro Item – verhindert永久 blockierte Queue
    var audioUnlocked = false;

    var videoContainer = document.getElementById('video-container');
    var videoPlayer = document.getElementById('video-player');
    var debugBar = document.getElementById('debug-bar');
    var wsStatus = document.getElementById('ws-status');
    var audioIndicator = document.getElementById('audio-indicator');

    var debug = new URLSearchParams(location.search).has('debug');
    if (debug) { debugBar.style.display = 'block'; wsStatus.style.display = 'block'; }

    // =============================================
    // Audio Unlock – kein blockierendes Overlay
    // =============================================
    // Stiller WAV-Clip (44 Bytes) um Autoplay-Berechtigung zu testen
    var SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';

    function tryAutoplayUnlock() {
      var a = new Audio(SILENT_WAV);
      a.volume = 0;
      a.play().then(function() {
        audioUnlocked = true;
        a.pause();
        a.src = '';
        updateAudioIndicator();
        dbg('Autoplay OK');
      }).catch(function() {
        a.src = '';
        updateAudioIndicator();
        dbg('Autoplay blockiert – Klick auf Overlay freischaltet');
      });
    }

    function unlockAudio() {
      if (audioUnlocked) return;
      var a = new Audio(SILENT_WAV);
      a.volume = 0;
      a.play().then(function() {
        audioUnlocked = true;
        a.pause();
        a.src = '';
        updateAudioIndicator();
        dbg('Audio freigeschaltet');
      }).catch(function() { a.src = ''; });
    }

    function updateAudioIndicator() {
      if (debug) {
        audioIndicator.style.display = 'block';
        if (audioUnlocked) {
          audioIndicator.className = 'ok';
          audioIndicator.textContent = '\u266B Audio OK';
        } else {
          audioIndicator.className = '';
          audioIndicator.textContent = '\u266B Audio blockiert';
        }
      }
    }

    // OBS / Streamlabs: CEF erlaubt Autoplay immer
    var isOBS = /obs|streamlabs|electron/i.test(navigator.userAgent);

    if (isOBS) {
      audioUnlocked = true;
      updateAudioIndicator();
      dbg('OBS erkannt – Autoplay aktiv');
    } else {
      tryAutoplayUnlock();
    }

    // Beliebiger Klick/Touch auf der Seite schaltet Audio frei
    ['click', 'keydown', 'touchstart', 'pointerdown'].forEach(function(evt) {
      document.addEventListener(evt, function() {
        unlockAudio();
        // Sofort verarbeitete Queue abarbeiten falls was wartet
        if (queue.length > 0 && !isPlaying) {
          processQueue();
        }
      });
    });

    // =============================================
    // WebSocket – Auto-Reconnect
    // =============================================
    function wsUrl() {
      var port = parseInt(location.port) || 3000;
      return 'ws://' + location.hostname + ':' + (port + 1);
    }

    var ws, reconnects = 0;

    function connect() {
      dbg('Verbinde: ' + wsUrl());
      ws = new WebSocket(wsUrl());

      ws.onopen = function() {
        reconnects = 0;
        wsStatus.className = 'ok';
        wsStatus.textContent = '\u25CF Connected';
        dbg('Verbunden');
      };

      ws.onmessage = function(e) {
        try { handleMessage(JSON.parse(e.data)); }
        catch (err) { dbg('Parse-Fehler: ' + err.message); }
      };

      ws.onclose = function() {
        wsStatus.className = 'err';
        wsStatus.textContent = '\u25CF Disconnected';
        reconnect();
      };

      ws.onerror = function() { ws.close(); };
    }

    function reconnect() {
      if (reconnects >= 60) return dbg('Max Reconnects');
      reconnects++;
      var ms = Math.min(1000 * Math.pow(1.4, reconnects - 1), 30000);
      dbg('Reconnect in ' + Math.round(ms / 1000) + 's (#' + reconnects + ')');
      setTimeout(connect, ms);
    }

    function handleMessage(data) {
      if (data.type === 'play') return enqueue(data);
      if (data.type === 'init' || data.type === 'config_reloaded') return dbg('Config OK');
    }

    // =============================================
    // Queue – robust und einfach
    // =============================================
    function enqueue(data) {
      var max = data.maxQueue || MAX_QUEUE;
      if (queue.length >= max) {
        dbg('Queue voll (' + max + '), drop: ' + data.file);
        return;
      }
      queue.push(data);
      dbg('+ "' + data.file + '" von ' + (data.user || '?') + ' [' + queue.length + ']');
      if (!isPlaying) processQueue();
    }

    function processQueue() {
      if (!queue.length) {
        isPlaying = false;
        dbg('Queue leer');
        return;
      }
      isPlaying = true;
      var item = queue.shift();
      dbg('> Spiele: "' + item.file + '" (' + (item.mediaType || 'sound') + ') [Q: ' + queue.length + ']');
      try {
        if (item.mediaType === 'video') {
          playVideo(item);
        } else {
          playSound(item);
        }
      } catch (e) {
        dbg('Play Exception: ' + e.message);
        finishCurrent();
      }
    }

    // Wird NUR aus cleanup-Funktionen aufgerufen, niemals direkt
    function finishCurrent() {
      if (!isPlaying) return;
      isPlaying = false;
      setTimeout(function() { processQueue(); }, 120);
    }

    // =============================================
    // Sound Player
    // =============================================
    function playSound(item) {
      var done = false;
      var playStarted = false;
      var durTimer = null;
      var safeTimer = null;

      var audio = new Audio('/media/sounds/' + item.file);
      audio.volume = (item.volume != null ? item.volume : 0.8);

      function cleanup() {
        if (done) return;
        done = true;
        clearTimeout(durTimer);
        clearTimeout(safeTimer);
        try { audio.pause(); } catch(e) {}
        audio.oncanplay = null;
        audio.oncanplaythrough = null;
        audio.onloadeddata = null;
        audio.onerror = null;
        audio.onended = null;
        audio.onstalled = null;
        audio.removeAttribute('src');
        audio.load();
        dbg('Sound done: "' + item.file + '"');
        finishCurrent();
      }

      function attemptPlay() {
        if (done || playStarted) return;
        playStarted = true;

        audio.play().then(function() {
          dbg('Sound spielt: "' + item.file + '"');
          // Dauer-Override Timer starten NACH erfolgreichem Play
          if (item.durationOverride && item.durationOverride > 0) {
            durTimer = setTimeout(function() {
              dbg('Sound cut@' + item.durationOverride + 'ms: "' + item.file + '"');
              cleanup();
            }, item.durationOverride);
          }
        }).catch(function(err) {
          if (!audioUnlocked) {
            dbg('AUDIO BLOCKIERT – Klick auf Overlay-Seite!');
          } else {
            dbg('Play rejected: ' + err.message);
          }
          cleanup();
        });
      }

      function onReady() {
        if (done) return;
        attemptPlay();
      }

      // Sicherheit: Max 60 Sekunden pro Sound
      safeTimer = setTimeout(function() {
        dbg('SAFETY TIMEOUT: "' + item.file + '"');
        cleanup();
      }, SAFETY_TIMEOUT_MS);

      // Multiple Events fuer Zuverlaessigkeit – {once:true} verhindert Mehrfachfeuer
      audio.addEventListener('canplaythrough', onReady, { once: true });
      audio.addEventListener('loadeddata', onReady, { once: true });
      audio.addEventListener('canplay', onReady, { once: true });

      audio.addEventListener('ended', function() {
        cleanup();
      }, { once: true });

      audio.addEventListener('error', function() {
        dbg('Fehlt: /media/sounds/' + item.file);
        cleanup();
      }, { once: true });

      audio.addEventListener('stalled', function() {
        // Wenn nach 3s noch stalled, abbrechen
        setTimeout(function() {
          if (!done) {
            dbg('Stalled timeout: "' + item.file + '"');
            cleanup();
          }
        }, 3000);
      }, { once: true });

      audio.load();

      // Fallback: Falls keines der Events feuert (z.B. Browser-Cache liefert schon readyState=4)
      setTimeout(function() {
        if (!done && !playStarted && audio.readyState >= 2) {
          attemptPlay();
        }
      }, 1500);

      // Hartes Fallback: Falls nach 3s gar nichts passiert
      setTimeout(function() {
        if (!done && !playStarted) {
          dbg('Fallback timeout: "' + item.file + '" (readyState=' + audio.readyState + ')');
          cleanup();
        }
      }, 3000);
    }

    // =============================================
    // Video Player
    // =============================================
    function playVideo(item) {
      var done = false;
      var playStarted = false;
      var durTimer = null;
      var safeTimer = null;

      function cleanup() {
        if (done) return;
        done = true;
        clearTimeout(durTimer);
        clearTimeout(safeTimer);
        videoPlayer.oncanplaythrough = null;
        videoPlayer.onloadeddata = null;
        videoPlayer.oncanplay = null;
        videoPlayer.onerror = null;
        videoPlayer.onended = null;
        videoPlayer.onstalled = null;
        hideVideo();
        dbg('Video done: "' + item.file + '"');
        finishCurrent();
      }

      function attemptPlay() {
        if (done || playStarted) return;
        playStarted = true;

        videoPlayer.play().then(function() {
          dbg('Video spielt: "' + item.file + '"');
          if (item.durationOverride && item.durationOverride > 0) {
            durTimer = setTimeout(function() {
              dbg('Video cut@' + item.durationOverride + 'ms: "' + item.file + '"');
              cleanup();
            }, item.durationOverride);
          }
        }).catch(function(err) {
          dbg('Video play rejected: ' + err.message);
          cleanup();
        });
      }

      function onReady() {
        if (done) return;
        attemptPlay();
      }

      // Sicherheit: Max 60 Sekunden pro Video
      safeTimer = setTimeout(function() {
        dbg('SAFETY TIMEOUT video: "' + item.file + '"');
        cleanup();
      }, SAFETY_TIMEOUT_MS);

      videoPlayer.src = '/media/videos/' + item.file;
      videoPlayer.volume = (item.volume != null ? item.volume : 0.5);
      videoPlayer.currentTime = 0;
      videoContainer.style.display = 'block';
      videoContainer.style.animation = 'fadeIn 0.2s ease-out';

      videoPlayer.addEventListener('canplaythrough', onReady, { once: true });
      videoPlayer.addEventListener('loadeddata', onReady, { once: true });
      videoPlayer.addEventListener('canplay', onReady, { once: true });

      videoPlayer.addEventListener('ended', function() {
        cleanup();
      }, { once: true });

      videoPlayer.addEventListener('error', function() {
        dbg('Fehlt: /media/videos/' + item.file);
        cleanup();
      }, { once: true });

      videoPlayer.addEventListener('stalled', function() {
        setTimeout(function() {
          if (!done) {
            dbg('Video stalled timeout: "' + item.file + '"');
            cleanup();
          }
        }, 3000);
      }, { once: true });

      videoPlayer.load();

      // Fallback
      setTimeout(function() {
        if (!done && !playStarted && videoPlayer.readyState >= 2) {
          attemptPlay();
        }
      }, 1500);

      setTimeout(function() {
        if (!done && !playStarted) {
          dbg('Video fallback timeout: "' + item.file + '" (readyState=' + videoPlayer.readyState + ')');
          cleanup();
        }
      }, 3000);
    }

    function hideVideo() {
      videoContainer.style.animation = 'fadeOut 0.3s ease-in forwards';
      setTimeout(function() {
        videoContainer.style.display = 'none';
        videoPlayer.pause();
        videoPlayer.removeAttribute('src');
        videoPlayer.load();
      }, 300);
    }

    // =============================================
    // Debug Logger
    // =============================================
    function dbg(msg) {
      var line = '[' + new Date().toLocaleTimeString('de-DE') + '] ' + msg;
      console.log(line);
      if (debug) debugBar.textContent = line;
    }

    // =============================================
    // Start
    // =============================================
    dbg('Overlay v3 geladen');
    connect();
  </script>
</body>
</html>
