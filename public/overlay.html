<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwitchSoundBoard – OBS Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
    }

    #overlay-container {
      position: relative;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #video-container {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 10;
    }
    #video-container video {
      max-width: 100%; max-height: 100%;
      border-radius: 12px;
    }

    /* Kleine Audio-Unlock Meldung – nicht blockierend */
    #audio-hint {
      display: none;
      position: fixed;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.7);
      color: #adadb8;
      padding: 6px 14px;
      border-radius: 6px;
      font: 12px/1.4 'Segoe UI', sans-serif;
      cursor: pointer;
      z-index: 9000;
      pointer-events: auto;
      user-select: none;
    }
    #audio-hint:hover { color: #efeff1; }
    #audio-hint.hidden { display: none; }

    /* Debug */
    #debug-bar {
      display: none;
      position: fixed;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.75);
      color: #00ff88;
      padding: 8px 12px;
      border-radius: 6px;
      font: 11px/1.5 monospace;
      z-index: 999;
      pointer-events: none;
      max-width: 320px;
    }

    #ws-status {
      display: none;
      position: fixed;
      bottom: 8px; left: 8px;
      padding: 4px 10px;
      border-radius: 4px;
      font: 11px monospace;
      z-index: 999;
      pointer-events: none;
    }
    #ws-status.ok { background: rgba(0,180,80,0.3); color: #0f8; }
    #ws-status.err { background: rgba(200,0,0,0.3); color: #f44; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%,-50%) scale(0.85); }
      to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      to   { opacity: 0; transform: translate(-50%,-50%) scale(1.15); }
    }
  </style>
</head>
<body>
  <div id="overlay-container">
    <div id="video-container">
      <video id="video-player" playsinline></video>
    </div>
  </div>

  <!-- Kleiner Hinweis statt grosses Overlay -->
  <div id="audio-hint">&#128263; Klick fuer Audio</div>

  <div id="debug-bar"></div>
  <div id="ws-status" class="err">&#11044; Waiting...</div>

  <script>
    // =============================================
    // TwitchSoundBoard – OBS Overlay Client v2
    // =============================================

    var queue = [];
    var isPlaying = false;
    var audioCtx = null;
    var MAX_QUEUE = 10;

    var videoContainer = document.getElementById('video-container');
    var videoPlayer = document.getElementById('video-player');
    var debugBar = document.getElementById('debug-bar');
    var wsStatus = document.getElementById('ws-status');
    var audioHint = document.getElementById('audio-hint');

    var debug = new URLSearchParams(location.search).has('debug');
    if (debug) { debugBar.style.display = 'block'; wsStatus.style.display = 'block'; }

    // ---- Audio Unlock ----
    function tryUnlockAudio() {
      if (audioCtx && audioCtx.state !== 'closed') return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { return; }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().then(function() {
          audioHint.classList.add('hidden');
          dbg('Audio freigeschaltet');
        }).catch(function() {});
      } else {
        audioHint.classList.add('hidden');
        dbg('Audio bereits freigeschaltet');
      }
    }

    function isAudioUnlocked() {
      if (!audioCtx) return false;
      return audioCtx.state === 'running';
    }

    // OBS User-Agent Check
    var ua = navigator.userAgent.toLowerCase();
    if (ua.indexOf('obs') !== -1 || ua.indexOf('streamlabs') !== -1 || ua.indexOf('electron') !== -1) {
      tryUnlockAudio();
      if (!isAudioUnlocked()) {
        // OBS: trotzdem versuchen, Audio ohne Context abzuspielen
        audioHint.classList.add('hidden');
      }
    } else {
      // Browser: Hinweis anzeigen
      audioHint.style.display = 'block';
    }

    audioHint.addEventListener('click', function() { tryUnlockAudio(); });
    document.body.addEventListener('click', function() { tryUnlockAudio(); });

    // ---- WebSocket ----
    function wsUrl() {
      var port = parseInt(location.port) || 3000;
      return 'ws://' + location.hostname + ':' + (port + 1);
    }

    var ws, reconnects = 0;

    function connect() {
      dbg('Verbinde: ' + wsUrl());
      ws = new WebSocket(wsUrl());

      ws.onopen = function() {
        reconnects = 0;
        wsStatus.className = 'ok';
        wsStatus.textContent = '\u25CF Connected';
        dbg('Verbunden');
      };

      ws.onmessage = function(e) {
        try { handle(JSON.parse(e.data)); }
        catch (err) { dbg('Parse-Fehler: ' + err.message); }
      };

      ws.onclose = function() {
        wsStatus.className = 'err';
        wsStatus.textContent = '\u25CF Disconnected';
        reconnect();
      };

      ws.onerror = function() { ws.close(); };
    }

    function reconnect() {
      if (reconnects >= 60) return dbg('Max Reconnects erreicht');
      reconnects++;
      var ms = Math.min(1000 * Math.pow(1.4, reconnects - 1), 30000);
      dbg('Reconnect in ' + Math.round(ms / 1000) + 's (#' + reconnects + ')');
      setTimeout(connect, ms);
    }

    function handle(data) {
      if (data.type === 'play') return enqueue(data);
      if (data.type === 'init' || data.type === 'config_reloaded') return dbg('Config aktualisiert');
    }

    // ---- Queue ----
    function enqueue(data) {
      var max = data.maxQueue || MAX_QUEUE;
      if (queue.length >= max) return dbg('Queue voll (' + max + '), verworfen: ' + data.file);
      queue.push(data);
      dbg('+ "' + data.file + '" von ' + data.user + ' via ' + data.source + ' [Queue: ' + queue.length + ']');
      if (!isPlaying) processQueue();
    }

    function processQueue() {
      if (!queue.length) {
        isPlaying = false;
        dbg('Queue leer');
        return;
      }
      isPlaying = true;
      var item = queue.shift();
      dbg('> Spielen: "' + item.file + '" (' + item.mediaType + ') [Queue: ' + queue.length + ']');
      try {
        item.mediaType === 'video' ? playVideo(item) : playSound(item);
      } catch (e) {
        dbg('Fehler bei play: ' + e.message);
        finished();
      }
    }

    // finished() ist die EINZIGE Funktion die next() aufrufen darf
    // Verhindert Doppelaufrufe von onended + durTimer + onerror
    function finished() {
      if (!isPlaying) return;
      isPlaying = false;
      setTimeout(processQueue, 150);
    }

    // ---- Sound ----
    function playSound(item) {
      var a = new Audio('/media/sounds/' + item.file);
      a.volume = item.volume != null ? item.volume : 0.8;
      var done = false;
      var durTimer = null;

      function doFinish() {
        if (done) return;
        done = true;
        clearTimeout(durTimer);
        try { a.pause(); } catch (e) {}
        a.oncanplaythrough = null;
        a.onerror = null;
        a.onended = null;
        a.src = '';
        dbg('Sound fertig: "' + item.file + '"');
        finished();
      }

      a.oncanplaythrough = function() {
        if (done) return;
        a.oncanplaythrough = null;
        a.play().catch(function(err) {
          dbg('Play rejected: ' + err.message);
          doFinish();
        });
        if (item.durationOverride && item.durationOverride > 0) {
          durTimer = setTimeout(function() {
            dbg('Sound abgeschnitten nach ' + item.durationOverride + 'ms');
            doFinish();
          }, item.durationOverride);
        }
      };

      a.onerror = function() {
        dbg('Fehlt: /media/sounds/' + item.file);
        doFinish();
      };

      a.onended = function() {
        doFinish();
      };

      // Fallback: falls canplaythrough nie feuert
      a.load();
      setTimeout(function() {
        if (!done && a.readyState >= 3) {
          a.play().catch(function() { doFinish(); });
          if (item.durationOverride && item.durationOverride > 0 && !durTimer) {
            durTimer = setTimeout(doFinish, item.durationOverride);
          }
        }
      }, 500);
    }

    // ---- Video ----
    function playVideo(item) {
      var done = false;
      var durTimer = null;

      function doFinish() {
        if (done) return;
        done = true;
        clearTimeout(durTimer);
        videoPlayer.oncanplaythrough = null;
        videoPlayer.onerror = null;
        videoPlayer.onended = null;
        hideVideo();
        dbg('Video fertig: "' + item.file + '"');
        finished();
      }

      videoPlayer.src = '/media/videos/' + item.file;
      videoPlayer.volume = item.volume != null ? item.volume : 0.5;
      videoPlayer.currentTime = 0;
      videoContainer.style.display = 'block';
      videoContainer.style.animation = 'fadeIn 0.2s ease-out';

      videoPlayer.oncanplaythrough = function() {
        if (done) return;
        videoPlayer.oncanplaythrough = null;
        videoPlayer.play().catch(function(err) {
          dbg('Video play rejected: ' + err.message);
          doFinish();
        });
      };

      videoPlayer.onerror = function() {
        dbg('Fehlt: /media/videos/' + item.file);
        doFinish();
      };

      videoPlayer.onended = function() {
        doFinish();
      };

      // Duration Override
      var dur = item.durationOverride || 5000;
      if (dur > 0) {
        durTimer = setTimeout(function() {
          dbg('Video gestoppt nach ' + dur + 'ms');
          doFinish();
        }, dur);
      }
    }

    function hideVideo() {
      videoContainer.style.animation = 'fadeOut 0.3s ease-in forwards';
      setTimeout(function() {
        videoContainer.style.display = 'none';
        videoPlayer.pause();
        videoPlayer.removeAttribute('src');
        videoPlayer.load();
      }, 300);
    }

    function dbg(msg) {
      var line = '[' + new Date().toLocaleTimeString('de-DE') + '] ' + msg;
      console.log(line);
      if (debug) debugBar.textContent = line;
    }

    // ---- Start ----
    dbg('Overlay geladen – v2');
    connect();
  </script>
</body>
</html>
